# Athlix security headers — include this in every `location` that serves
# responses (Nginx resets inherited add_header when a location adds its own,
# so we include this snippet wherever headers are needed).
#
# NOTE: if you edit the inline <script> in index.html, recompute its sha256
# and update the script-src hash below (and vercel.json / public/_headers).

add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; frame-src https://challenges.cloudflare.com; script-src 'self' 'sha256-8orYpwQCajqXGH+vLvFGkgSU1gjm0NQ+G4cPVa8aTcQ=' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self' https://challenges.cloudflare.com https://*.sentry.io; form-action 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), usb=(), interest-cohort=()" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
