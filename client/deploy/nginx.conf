# ─────────────────────────────────────────────────────────────────────────
# Athlix — production Nginx config for the React/Vite static build.
# Serves client/dist and applies the same security header policy used on
# Vercel/Netlify (see security-headers.conf, included per-location).
#
# Install: place this file + security-headers.conf in /etc/nginx/conf.d/,
# adjust server_name / root / TLS paths, then `nginx -t && systemctl reload nginx`.
# ─────────────────────────────────────────────────────────────────────────

# Redirect all HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name athlix.co www.athlix.co;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name athlix.co www.athlix.co;

    # TLS (point these at your real certificate, e.g. from certbot).
    ssl_certificate     /etc/letsencrypt/live/athlix.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/athlix.co/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Path to the Vite build output (client/dist).
    root /var/www/athlix/dist;
    index index.html;

    # Content-hashed assets: cache immutably for a year.
    location /assets/ {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA routing: serve index.html for client-side routes; never cache the shell.
    location / {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy /api to the Athlix backend on the same host so the
    # frontend keeps using same-origin "/api/apply" (matches connect-src 'self').
    # location /api/ {
    #     include /etc/nginx/conf.d/security-headers.conf;
    #     proxy_pass http://127.0.0.1:8787;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
}
